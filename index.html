<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardinals Watch — Your Team. Every Day.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--burgundy:#b3122e;--burgundy-deep:#7a0c1f;--burgundy-bright:#c41e3a;--gold:#f3c14b;--gold-dim:#c79a3a;--bg:#0a0f1c;--bg-2:#0f1526;--panel:#141b30;--panel-2:#18203a;--ink:#f3ece0;--muted:#a9b4c8;--muted-2:#6f7b93;--red:#ff8275;--green:#5fb47a;--line:rgba(243,193,75,.22);--line-soft:rgba(243,193,75,.10);--glow1:rgba(196,30,58,.42);--glow2:rgba(12,26,48,.6);--stripe:rgba(243,193,75,.022)}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
  body{min-height:100vh;background:radial-gradient(1200px 600px at 80% -10%,var(--glow1),transparent 60%),radial-gradient(900px 500px at -10% 110%,var(--glow2),transparent 55%),repeating-linear-gradient(135deg,var(--stripe) 0 2px,transparent 2px 26px),var(--bg);background-attachment:fixed;padding:0 0 48px}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1280px;margin:0 auto;padding:0 20px}
  .ticker{border-bottom:1px solid var(--line);background:linear-gradient(90deg,var(--burgundy-deep),var(--burgundy));overflow:hidden;white-space:nowrap;height:34px;display:flex;align-items:center}
  .ticker .tag{background:var(--gold);color:var(--burgundy-deep);font-family:'Oswald';font-weight:700;font-size:12px;letter-spacing:1.5px;padding:0 12px;height:34px;display:flex;align-items:center;flex:none;z-index:2}
  .ticker .track{display:inline-flex;align-items:center;animation:scroll 70s linear infinite;will-change:transform}
  .ticker .track span{font-family:'Barlow Condensed';font-weight:600;font-size:14px;letter-spacing:.4px;color:var(--ink);padding:0 26px;position:relative;opacity:.92}
  .ticker .track span::before{content:"\25C6";color:var(--gold);position:absolute;left:4px;font-size:8px;top:50%;transform:translateY(-50%)}
  @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  header{padding:26px 0 18px;border-bottom:1px solid var(--line-soft)}
  .head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
  .brand{display:flex;align-items:center;gap:16px}
  .crest{width:54px;height:54px;flex:none;border-radius:6px;background:linear-gradient(160deg,var(--burgundy-bright),var(--burgundy-deep));border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Oswald';font-weight:700;color:var(--gold);font-size:22px;box-shadow:0 6px 22px rgba(0,0,0,.5),inset 0 0 0 3px rgba(0,0,0,.35)}
  .brand h1{font-family:'Oswald';font-weight:700;font-size:30px;letter-spacing:1px;line-height:1;text-transform:uppercase}
  .brand h1 .g{color:var(--gold)}
  .brand .sub{font-family:'Barlow Condensed';font-weight:600;letter-spacing:3px;font-size:12px;color:var(--gold-dim);text-transform:uppercase;margin-top:5px}
  .status{text-align:right;font-family:'Barlow Condensed';letter-spacing:.5px}
  .status .live{display:inline-flex;align-items:center;gap:7px;color:var(--gold);font-weight:700;font-size:13px;letter-spacing:2px;text-transform:uppercase}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--gold);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,255,255,.18)}70%{box-shadow:0 0 0 9px rgba(255,255,255,0)}100%{box-shadow:0 0 0 0 rgba(255,255,255,0)}}
  .status .upd{color:var(--muted);font-size:13px;margin-top:4px}
  .hero{margin-top:22px;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:linear-gradient(120deg,var(--burgundy-deep),var(--panel));box-shadow:0 18px 50px rgba(0,0,0,.5)}
  .hero-top{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.05);border-bottom:1px solid var(--line-soft);padding:9px 18px}
  .hero-top .lbl{font-family:'Oswald';font-weight:600;letter-spacing:3px;font-size:13px;color:var(--gold);text-transform:uppercase}
  .hero-top .rec{font-family:'Oswald';font-weight:500;letter-spacing:1px;font-size:14px;color:var(--ink)}
  .hero-body{display:grid;grid-template-columns:1.3fr 1fr;gap:18px;padding:22px 24px}
  .matchup .when{font-family:'Barlow Condensed';font-weight:600;letter-spacing:1px;color:var(--gold-dim);text-transform:uppercase;font-size:14px}
  .matchup .vs{font-family:'Oswald';font-weight:700;font-size:34px;line-height:1.05;margin-top:6px;text-transform:uppercase}
  .matchup .vs .opp{color:var(--gold)}
  .matchup .meta{color:var(--muted);font-size:15px;margin-top:10px;font-family:'Barlow Condensed';letter-spacing:.5px}
  .count{display:flex;gap:10px;align-items:center;justify-content:flex-end}
  .count .unit{text-align:center;min-width:62px}
  .count .num{font-family:'Oswald';font-weight:700;font-size:42px;color:var(--gold);line-height:1}
  .count .cap{font-family:'Barlow Condensed';font-weight:600;letter-spacing:2px;font-size:11px;color:var(--muted-2);text-transform:uppercase;margin-top:5px}
  .count .colon{font-family:'Oswald';font-weight:600;font-size:34px;color:var(--burgundy-bright);align-self:flex-start;margin-top:-2px}
  .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:18px;margin-top:20px}
  .panel{grid-column:span 6;background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line-soft);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 10px 30px rgba(0,0,0,.35)}
  .col-4{grid-column:span 4}.col-8{grid-column:span 8}.col-12{grid-column:span 12}
  .p-head{display:flex;align-items:center;gap:10px;padding:12px 16px;background:linear-gradient(90deg,var(--burgundy),var(--burgundy-deep));border-bottom:1px solid var(--line)}
  .p-head .bar{width:4px;height:18px;background:var(--gold);border-radius:2px;flex:none}
  .p-head h2{font-family:'Oswald';font-weight:600;letter-spacing:2px;font-size:15px;text-transform:uppercase;flex:1}
  .p-head .ct{font-family:'Oswald';font-weight:600;font-size:13px;color:var(--gold);letter-spacing:1px}
  .p-body{padding:8px 0;flex:1}
  .scroll{max-height:330px;overflow-y:auto}
  .scroll::-webkit-scrollbar{width:8px}.scroll::-webkit-scrollbar-thumb{background:var(--burgundy-bright);border-radius:6px}.scroll::-webkit-scrollbar-track{background:transparent}
  .grouphd{font-family:'Oswald';font-weight:600;letter-spacing:2px;font-size:12px;color:var(--gold-dim);text-transform:uppercase;padding:10px 16px 4px;border-top:1px solid var(--line-soft)}
  .grouphd:first-child{border-top:none}
  .row{display:flex;align-items:center;gap:12px;padding:7px 16px;border-bottom:1px solid rgba(255,255,255,.03);transition:background .15s}
  .row:hover{background:rgba(255,255,255,.04)}
  .jersey{font-family:'Oswald';font-weight:700;font-size:15px;color:var(--gold);width:34px;text-align:center;flex:none}
  .nm{font-weight:600;font-size:15px;flex:1}
  .pos{font-family:'Barlow Condensed';font-weight:600;letter-spacing:1px;font-size:13px;color:var(--muted);background:rgba(255,255,255,.05);padding:2px 8px;border-radius:4px}
  .badge{font-family:'Barlow Condensed';font-weight:700;letter-spacing:.5px;font-size:11px;padding:2px 8px;border-radius:4px;text-transform:uppercase}
  .badge.out{background:rgba(226,87,76,.18);color:var(--red);border:1px solid rgba(226,87,76,.45)}
  .badge.q{background:rgba(255,182,18,.16);color:var(--gold);border:1px solid rgba(255,182,18,.4)}
  .news a{display:block;padding:11px 16px;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s}
  .news a:hover{background:rgba(255,255,255,.04)}
  .news .hl{font-family:'Oswald';font-weight:500;font-size:15.5px;line-height:1.25}
  .news a:hover .hl{color:var(--gold)}
  .news .ds{color:var(--muted);font-size:13.5px;margin-top:4px;line-height:1.4}
  .news .tm{font-family:'Barlow Condensed';font-weight:600;letter-spacing:1px;font-size:11px;color:var(--muted-2);text-transform:uppercase;margin-top:5px}
  .east{display:flex;flex-direction:column}
  .east .row{justify-content:space-between}
  .east .tinfo{display:flex;align-items:center;gap:12px}
  .east .rank{font-family:'Oswald';font-weight:700;font-size:13px;color:var(--muted-2);width:16px;text-align:center;flex:none}
  .east .rstats{display:flex;align-items:baseline;gap:12px}
  .east .gb{font-family:'Oswald';font-weight:600;font-size:13px;color:var(--muted-2);min-width:30px;text-align:right}
  .east img{width:30px;height:30px;flex:none}
  .east .tn{font-family:'Oswald';font-weight:500;font-size:16px;letter-spacing:.5px}
  .east .rec{font-family:'Oswald';font-weight:600;font-size:15px;color:var(--gold)}
  .east .me{outline:1px solid var(--line);background:rgba(255,255,255,.04)}
  .east .me .tn{color:var(--gold)}
  .pod a{display:flex;gap:12px;align-items:flex-start;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s}
  .pod a:hover{background:rgba(255,255,255,.04)}
  .pod .play{width:30px;height:30px;flex:none;border-radius:50%;background:var(--gold);color:var(--burgundy-deep);display:flex;align-items:center;justify-content:center;font-size:13px;margin-top:2px}
  .pod .et{font-family:'Oswald';font-weight:500;font-size:15px;line-height:1.25}
  .pod a:hover .et{color:var(--gold)}
  .pod .ed{font-family:'Barlow Condensed';font-weight:600;letter-spacing:1px;font-size:12px;color:var(--muted-2);text-transform:uppercase;margin-top:4px}
  .podlinks{display:flex;gap:8px;padding:12px 16px;flex-wrap:wrap}
  .podlinks a{font-family:'Oswald';font-weight:600;letter-spacing:1px;font-size:12px;text-transform:uppercase;padding:7px 12px;border:1px solid var(--line);border-radius:6px;color:var(--gold);transition:all .15s}
  .podlinks a:hover{background:var(--gold);color:var(--burgundy-deep)}
  .empty,.err{padding:22px 16px;color:var(--muted);font-family:'Barlow Condensed';font-size:15px;letter-spacing:.5px}
  .err{color:var(--red)}
  .loading{padding:22px 16px;color:var(--muted-2);font-family:'Barlow Condensed';letter-spacing:1px;font-size:14px;text-transform:uppercase}
  footer{margin-top:30px;padding-top:16px;border-top:1px solid var(--line-soft);color:var(--muted-2);font-family:'Barlow Condensed';font-size:13px;letter-spacing:.5px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
  footer .g{color:var(--gold-dim)}
  @media(max-width:900px){.panel{grid-column:span 12}.col-4,.col-8{grid-column:span 12}.hero-body{grid-template-columns:1fr}.count{justify-content:flex-start}.brand h1{font-size:24px}.matchup .vs{font-size:27px}}
  .film-launch{position:fixed;right:22px;bottom:22px;z-index:40;display:flex;align-items:center;gap:10px;background:linear-gradient(160deg,var(--gold),var(--gold-dim));color:var(--burgundy-deep);font-family:'Oswald';font-weight:700;letter-spacing:1.5px;font-size:14px;text-transform:uppercase;border:none;border-radius:50px;padding:14px 22px;cursor:pointer;box-shadow:0 10px 30px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.2);transition:transform .15s,box-shadow .15s}
  .film-launch:hover{transform:translateY(-2px)}
  .film-launch .ic{font-size:17px}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.66);backdrop-filter:blur(3px);z-index:50;opacity:0;pointer-events:none;transition:opacity .25s}
  .scrim.open{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(420px,92vw);z-index:60;transform:translateX(102%);background:linear-gradient(180deg,var(--bg-2),var(--bg));border-left:1px solid var(--line);box-shadow:-20px 0 60px rgba(0,0,0,.6);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
  .drawer.open{transform:translateX(0)}
  .drawer-hd{display:flex;align-items:center;gap:12px;padding:18px 20px;background:linear-gradient(90deg,var(--burgundy),var(--burgundy-deep));border-bottom:1px solid var(--line)}
  .drawer-hd .bar{width:4px;height:24px;background:var(--gold);border-radius:2px}
  .drawer-hd h2{font-family:'Oswald';font-weight:700;letter-spacing:2px;font-size:19px;text-transform:uppercase;flex:1}
  .drawer-hd button{background:none;border:1px solid var(--line);color:var(--gold);width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:18px;line-height:1;transition:all .15s}
  .drawer-hd button:hover{background:var(--gold);color:var(--burgundy-deep)}
  .drawer-body{padding:18px 20px;overflow-y:auto;flex:1}
  .drawer-body::-webkit-scrollbar{width:8px}.drawer-body::-webkit-scrollbar-thumb{background:var(--burgundy-bright);border-radius:6px}
  .src{margin-bottom:24px}
  .src-hd{display:flex;align-items:baseline;gap:8px;margin-bottom:12px}
  .src-hd .nm{font-family:'Oswald';font-weight:600;letter-spacing:1.5px;font-size:16px;text-transform:uppercase;color:var(--gold)}
  .src-hd .tag{font-family:'Barlow Condensed';font-weight:600;letter-spacing:1px;font-size:11px;text-transform:uppercase;color:var(--muted-2)}
  .jump{display:flex;gap:8px;margin-bottom:12px}
  .jump input{flex:1;background:var(--panel);border:1px solid var(--line-soft);border-radius:8px;color:var(--ink);font-family:'Barlow';font-size:14px;padding:10px 12px;outline:none}
  .jump input:focus{border-color:var(--line)}
  .jump button{background:var(--burgundy-bright);border:1px solid var(--line-soft);color:#fff;font-family:'Oswald';font-weight:600;letter-spacing:1px;font-size:13px;text-transform:uppercase;border-radius:8px;padding:0 16px;cursor:pointer;transition:background .15s}
  .jump button:hover{background:var(--gold);color:var(--burgundy-deep)}
  .links{display:flex;flex-direction:column;gap:8px}
  .links a{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--panel);border:1px solid var(--line-soft);border-radius:8px;font-family:'Barlow';font-weight:500;font-size:14.5px;transition:all .15s}
  .links a:hover{border-color:var(--line);background:var(--panel-2);color:var(--gold);transform:translateX(3px)}
  .links a .ar{margin-left:auto;color:var(--muted-2);font-size:13px}
  .links a:hover .ar{color:var(--gold)}
  .drawer-note{font-family:'Barlow Condensed';font-size:12.5px;letter-spacing:.4px;color:var(--muted-2);line-height:1.5;border-top:1px solid var(--line-soft);padding-top:14px}
  .drawer-note .g{color:var(--gold-dim)}
  .bet-launch{position:fixed;right:22px;bottom:84px;z-index:40;display:flex;align-items:center;gap:10px;background:var(--bg-2);color:var(--gold);font-family:'Oswald';font-weight:700;letter-spacing:1.5px;font-size:14px;text-transform:uppercase;border:1px solid var(--gold);border-radius:50px;padding:13px 22px;cursor:pointer;box-shadow:0 10px 30px rgba(0,0,0,.5);transition:transform .15s,background .15s,color .15s}
  .bet-launch:hover{transform:translateY(-2px);background:var(--gold);color:var(--bg)}
  .bet-launch .ic{font-size:16px}
  .links a.feat{border-color:var(--gold);color:var(--gold)}

  /* ===== FIX: STRICT HEIGHT FORCE OVERFLOW VIEW ===== */
  .stats-scroll { height: 380px !important; max-height: 380px !important; overflow-y: scroll !important; overflow-x: auto !important; }

  .stats-tabs{display:flex;gap:0;border-bottom:1px solid var(--line);overflow-x:auto;padding:0 4px}
  .stats-tabs::-webkit-scrollbar{height:4px}.stats-tabs::-webkit-scrollbar-thumb{background:var(--burgundy-bright)}
  .stab{font-family:'Oswald';font-weight:600;letter-spacing:1.5px;font-size:12px;text-transform:uppercase;padding:10px 16px;color:var(--muted-2);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none}
  .stab:hover{color:var(--ink)}.stab.active{color:var(--gold);border-bottom-color:var(--gold)}
  .stats-tbl{width:100%;border-collapse:collapse;font-size:13.5px}
  .stats-tbl thead tr{background:rgba(255,255,255,.05);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:2}
  .stats-tbl th{font-family:'Oswald';font-weight:600;letter-spacing:1px;font-size:11px;text-transform:uppercase;color:var(--muted-2);padding:8px 10px;text-align:right;white-space:nowrap;cursor:pointer;user-select:none;background:var(--panel-2)}
  .stats-tbl th:first-child{text-align:left;position:sticky;left:0;background:var(--panel-2);z-index:3}
  .stats-tbl th.sorted{color:var(--gold)}
  .stats-tbl th:hover{color:var(--ink)}
  .stats-tbl td{padding:7px 10px;text-align:right;border-bottom:1px solid rgba(255,255,255,.03);font-family:'Barlow Condensed';font-size:13.5px;letter-spacing:.3px;white-space:nowrap}
  .stats-tbl td:first-child{text-align:left;font-weight:600;max-width:180px;overflow:hidden;text-overflow:ellipsis;position:sticky;left:0;background:var(--panel);z-index:1}
  .stats-tbl tr:hover td{background:rgba(255,255,255,.04)}
  .stats-tbl tr:hover td:first-child{background:rgba(255,255,255,.04)}
  .stats-updated{font-family:'Barlow Condensed';font-size:12px;letter-spacing:.5px;color:var(--muted-2);padding:7px 16px;text-align:right;border-top:1px solid var(--line-soft);background:rgba(255,255,255,.02)}
  .stats-err{padding:20px 16px;color:var(--muted);font-family:'Barlow Condensed';font-size:14px}
  .sort-arrow{font-size:9px;margin-left:3px;opacity:.6}
  .stats-reset-btn{background:none;border:1px solid var(--line);color:var(--gold-dim);font-family:'Oswald';font-weight:600;font
